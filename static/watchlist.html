<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>觀察名單</title>
  <link rel="stylesheet" type="text/css" href="/css/watchlist.css" />
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div id="login-prompt" class="prompt-container" style="display: none;">
    <div class="prompt-box">
        <h2 class="prompt-title">尚未登入</h2>
        <p class="prompt-subtitle">請登入以查看您的觀察名單</p>
        <div class="login-link login-trigger">登入</div>
    </div>
  </div>
  <div class="search-container">
    <div class="search-box">
      <input type="text" class="stock-search" placeholder="輸入股號或股名">
      <div id="search-results" class="search-suggestions" style="display: none;"></div>
    </div>
  </div>
  <div class="watchlist">
    <!-- <div class="stock-content">
      <div class="stock-main">
        <a href="/stock/2330" class="stock-name"></a>
        <div class="stock-price"></div>
        <div class="stock-trend">
          <span class="change-point"></span>
          <span class="change-percent"></span>
        </div>
      </div>
      <div class="mini-chart" id="taiex-chart"></div>
    </div> -->
  </div>
  <div class="time-container">
    <span class="time"></span>
  </div>
  <script src="/js/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@5.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/js/watchlist.js"></script>
</body>
</html>
