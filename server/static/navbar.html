<link rel="stylesheet" type="text/css" href="/css/navbar.css">
<div class="opacity"></div>
<header class="navbar">
    <div class="logo">
        <img src="/img/logo.png" class="logo_img">
        <span class="logo_word">BestTrade</span>
    </div>
    <ul class="list">
        <li><a href="/" class="bar">首頁</a></li>
        <li><a href="/todaymarket" class="bar">今日行情</a></li>
        <li><a href="/stockcategory" class="bar">台股資訊</a></li>
        <li><a href="/hotstock" class="bar">市場焦點</a></li>
        <li><a href="/watchlist" class="bar">觀察名單</a></li>
        <li><a href="/selfstock" class="bar">持股名單</a></li>
    </ul>
    <div class="member">
        <div class="member_btn">會員登入</div>
    </div>
</header>
<div class="account" id="sign">
    <div class="close">&times;</div>
    <div class="account-title">註冊會員帳號</div>
    <div class="input-box">
        <input class="email" id="sign-email" type="text" placeholder="輸入電子信箱"/>
    </div>
    <div class="input-box">
        <input class="password" id="sign-password" type="password" placeholder="輸入密碼"/>
    </div>
    <div class="account-button" id="sign-button">註冊新帳戶</div>
    <div class="account-word" id="sign-word">已經有帳戶了？點此登入</div>
</div>
<div class="account" id="login">
    <div class="close">&times;</div>
    <div class="account-title">登入會員帳號</div>
    <div class="input-box">
        <input class="email" id="login-email" type="text" placeholder="輸入電子信箱"/>
    </div>
    <div class="input-box">
        <input class="password" id="login-password" type="password" placeholder="輸入密碼"/>
    </div>
    <div class="account-button" id="login-button">登入帳戶</div>
    <div class="account-word" id="login-word">還沒有帳戶？點此註冊</div>
</div>
<script src="/js/stock.js"></script>
