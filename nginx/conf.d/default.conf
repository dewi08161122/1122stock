server {
    listen 80;
    server_name 1122stock.com www.1122stock.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 1122stock.com www.1122stock.com;

    ssl_certificate /etc/letsencrypt/live/1122stock.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1122stock.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        root /usr/share/nginx/html/static;
        index index.html;
        try_files $uri $uri/ @proxy_to_app;
    }

    location /css/ { alias /usr/share/nginx/html/public/css/; }
    location /js/ { alias /usr/share/nginx/html/public/javascript/; }
    location /img/ { alias /usr/share/nginx/html/public/image/; }

    location /api/ {
        proxy_pass http://fastapi:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @proxy_to_app {
        proxy_pass http://fastapi:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}