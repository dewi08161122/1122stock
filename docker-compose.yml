services:
  nginx:
    image: nginx:alpine
    container_name: stock_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt
      - ./server/static:/usr/share/nginx/html/static:ro
      - ./server/public:/usr/share/nginx/html/public:ro
    depends_on:
      - fastapi
    networks:
      - stock_net

  fastapi:
    build: ./server
    container_name: stock_api
    restart: always
    expose:
      - "8000"
    env_file: .env
    networks:
      - stock_net

  redis:
    image: redis:alpine
    container_name: stock_redis
    restart: always
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb 
      --maxmemory-policy allkeys-lru
    networks:
      - stock_net

  crawler:
    build: ./crawler
    container_name: stock_crawler
    env_file: .env
    networks:
      - stock_net

networks:
  stock_net:
    driver: bridge